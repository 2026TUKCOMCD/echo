spring:
  datasource:
    url: jdbc:mysql://localhost:3306/echo_test_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: echouser
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    defer-datasource-initialization: false
  sql:
    init:
      mode: never

# OpenAI API 설정
openai:
  api:
    url: https://api.openai.com/v1
    key: ${OPENAI_API_KEY}
  whisper:
    model: whisper-1
    language: ko
  chat:
    model: gpt-4o-mini
    temperature: 0.7
    max-tokens: 512

# Azure Cognitive Services TTS 설정
azure:
  tts:
    endpoint: https://koreacentral.tts.speech.microsoft.com
    api-key: ${AZURE_TTS_API_KEY}
    default-voice: ko-KR-SunHiNeural

logging:
  level:
    feign: DEBUG
    com.example.echo: DEBUG
