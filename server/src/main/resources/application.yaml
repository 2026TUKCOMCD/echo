spring:
  profiles:
    active: local
  application:
    name: echo
  datasource:
    url: jdbc:mysql://localhost:3306/echo_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: echouser
    # password는 application-local.yaml에서 설정
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update  # 개발 중에는 update, 운영에서는 validate/ update 설정이면 처음에 테이블 생성, 이후에는 변경이 없으면 테이블 건드리지 않음
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    defer-datasource-initialization: true  # JPA 테이블 생성 후 data.sql 실행

  # SQL 초기화 설정 (data.sql 실행)
  sql:
    init:
      mode: always  # 매 시작마다 data.sql 실행 (개발용)

openai:
  api:
    url: https://api.openai.com/v1
  whisper:
    model: whisper-1
    language: ko
  chat:
    model: gpt-4o-mini
    temperature: 0.7
    max-tokens: 1024

# Azure Cognitive Services TTS 설정
azure:
  tts:
    endpoint: https://koreacentral.tts.speech.microsoft.com
    # api-key는 application-local.yaml에서 설정 (예: api-key: your-key-here)
    default-voice: ko-KR-SunHiNeural  # 기본 음성 (친근하고 따뜻한 여성)
