spring:
  datasource:
    url: jdbc:mysql://echo-db.cd6842c0wli8.ap-northeast-2.rds.amazonaws.com:3306/echo_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: echouser
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

openai:
  api:
    key: ${OPENAI_API_KEY}

kakao:
  api:
    key: ${KAKAO_API_KEY}

azure:
  tts:
    endpoint: https://koreacentral.tts.speech.microsoft.com
    api-key: ${AZURE_TTS_API_KEY}
    default-voice: ko-KR-SunHiNeural

tts:
  provider: supertone

supertone:
  base-url: https://supertoneapi.com
  voice-id: 195e1922033a6168f0c90f
  default-style: serene
  model: sona_speech_2
  api-key: ${SUPERTONE_API_KEY}
